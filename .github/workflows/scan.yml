name: KR STOCK

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "테스트용 종목 수 제한 (비우면 전체)"
        required: false
        default: ""
      no_telegram:
        description: "텔레그램 발송 생략 (true/false)"
        required: false
        default: "false"
  schedule:
    # 한국 장 운영시간(09:00~15:30 KST) 중 주기적으로 실행
    # KST는 UTC+9, DST 없음 -> 오프셋 고정
    - cron: "30 0 * * 1-5"   # 09:30 KST (장 시작 직후)
    - cron: "0 3 * * 1-5"    # 12:00 KST (점심)
    - cron: "30 5 * * 1-5"   # 14:30 KST (장 마감 전)
    - cron: "0 7 * * 1-5"    # 16:00 KST (장 마감 후 정리)

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ "${{ github.event.inputs.no_telegram }}" = "true" ]; then
            ARGS="$ARGS --no-telegram"
          fi
          python main.py $ARGS

      - name: Upload Excel report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kr-stock-scan-report-${{ github.run_id }}
          path: output/*.xlsx
          retention-days: 30

      - name: Commit universe cache (if updated)
        if: always()
        run: |
          if [ -n "$(git status --porcelain config/universe_cache.csv 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add config/universe_cache.csv
            git commit -m "chore: update universe cache [skip ci]"
            git push
          else
            echo "유니버스 캐시 변경 없음"
          fi
